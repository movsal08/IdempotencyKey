name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore

    - name: Build
      run: dotnet build -c Release --no-restore

    - name: Unit Tests
      run: |
        dotnet test tests/IdempotencyKey.Tests/IdempotencyKey.Tests.csproj -c Release --no-build
        dotnet test tests/IdempotencyKey.AspNetCore.Tests/IdempotencyKey.AspNetCore.Tests.csproj -c Release --no-build

    - name: Integration Tests
      run: |
        dotnet test tests/IdempotencyKey.Store.Postgres.Tests/IdempotencyKey.Store.Postgres.Tests.csproj -c Release --no-build
        dotnet test tests/IdempotencyKey.Store.Redis.Tests/IdempotencyKey.Store.Redis.Tests.csproj -c Release --no-build

    - name: Smoke Test
      run: dotnet run -c Release --project benchmarks/IdempotencyKey.Benchmarks/IdempotencyKey.Benchmarks.csproj --no-build -- smoke
