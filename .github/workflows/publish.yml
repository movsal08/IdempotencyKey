name: Manual Publish to GitHub Packages and NuGet.org
on:
  workflow_dispatch:

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    
    permissions:
      packages: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore IdempotencyKey.slnx

      - name: Build
        run: dotnet build IdempotencyKey.slnx --configuration Release --no-restore

      - name: Determine package version
        id: version
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            LATEST_TAG=$(git tag --list "v*" --sort=-v:refname | head -n 1)
            if [[ -z "$LATEST_TAG" ]]; then
              VERSION="0.1.0-preview.${GITHUB_RUN_NUMBER}"
            else
              VERSION="${LATEST_TAG#v}-preview.${GITHUB_RUN_NUMBER}"
            fi
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Pack
        run: dotnet pack IdempotencyKey.slnx --configuration Release --no-build -p:ContinuousIntegrationBuild=true -p:Version=${{ steps.version.outputs.version }}

      - name: Publish to GitHub Packages
        run: dotnet nuget push "src/**/bin/Release/*.nupkg" --source "https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json" --api-key ${{ secrets.GITHUB_TOKEN }} --skip-duplicate

      # NEW STEP: Publish to NuGet.org
      - name: Publish to NuGet.org
        run: dotnet nuget push "src/**/bin/Release/*.nupkg" --source "https://api.nuget.org/v3/index.json" --api-key ${{ secrets.NUGET_API_KEY }} --skip-duplicate
