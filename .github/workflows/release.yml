name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to NuGet.org (only if NUGET_API_KEY is set)"
        required: false
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "9.0.x"

      - name: Compute version
        id: version
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"   # e.g. v0.1.0 (or branch name for workflow_dispatch)
          if [[ "$GITHUB_REF" == refs/tags/v*.*.* ]]; then
            VERSION="${TAG#v}"
          else
            VERSION="0.0.0-dev"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Restore
        run: dotnet restore

      - name: Build (Release)
        run: dotnet build -c Release --no-restore

      - name: Test (Release)
        run: dotnet test -c Release --no-build

      - name: Pack (Release)
        run: dotnet pack -c Release --no-build -o ./artifacts -p:PackageVersion=${{ steps.version.outputs.version }}

      - name: Check NuGet API key
        id: nugetkey
        shell: bash
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [ -n "$NUGET_API_KEY" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to NuGet.org (tag)
        if: ${{ steps.nugetkey.outputs.present == 'true' && startsWith(github.ref, 'refs/tags/v') }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Publish to NuGet.org (manual)
        if: ${{ steps.nugetkey.outputs.present == 'true' && github.event_name == 'workflow_dispatch' && inputs.publish }}
        run: dotnet nuget push "./artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source https://api.nuget.org/v3/index.json --skip-duplicate

      - name: Create GitHub Release
        if: ${{ startsWith(github.ref, 'refs/tags/v') }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" \
            ./artifacts/*.nupkg \
            ./artifacts/*.snupkg \
            --generate-notes
